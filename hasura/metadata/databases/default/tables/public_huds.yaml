table:
  name: huds
  schema: public
select_permissions:
  - role: administrator
    permission:
      columns:
        - id
        - name
        - slug
        - description
        - version
        - format
        - uploader_steam_id
        - is_default
        - is_public
        - size_bytes
        - extracted_dir
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: match_organizer
    permission:
      columns:
        - id
        - name
        - slug
        - description
        - version
        - format
        - uploader_steam_id
        - is_default
        - is_public
        - size_bytes
        - extracted_dir
        - created_at
        - updated_at
      filter:
        is_public:
          _eq: true
    comment: ""
