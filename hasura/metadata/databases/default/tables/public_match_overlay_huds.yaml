table:
  name: match_overlay_huds
  schema: public
object_relationships:
  - name: match_option
    using:
      foreign_key_constraint_on: match_options_id
  - name: hud
    using:
      foreign_key_constraint_on: hud_id
insert_permissions:
  - role: match_organizer
    permission:
      check:
        match_option:
          _or:
            - matches:
                is_organizer:
                  _eq: true
            - tournament:
                is_organizer:
                  _eq: true
            - tournament_stage:
                tournament:
                  is_organizer:
                    _eq: true
            - tournament_bracket:
                stage:
                  tournament:
                    is_organizer:
                      _eq: true
      columns:
        - match_options_id
        - slot_key
        - label
        - hud_id
        - display_order
    comment: ""
select_permissions:
  - role: guest
    permission:
      columns:
        - id
        - match_options_id
        - slot_key
        - label
        - hud_id
        - display_order
        - created_at
        - updated_at
      filter: {}
    comment: ""
  - role: match_organizer
    permission:
      columns:
        - id
        - match_options_id
        - slot_key
        - label
        - hud_id
        - display_order
        - created_at
        - updated_at
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - id
        - match_options_id
        - slot_key
        - label
        - hud_id
        - display_order
        - created_at
        - updated_at
      filter: {}
    comment: ""
update_permissions:
  - role: match_organizer
    permission:
      columns:
        - slot_key
        - label
        - hud_id
        - display_order
      filter:
        match_option:
          _or:
            - matches:
                is_organizer:
                  _eq: true
            - tournament:
                is_organizer:
                  _eq: true
            - tournament_stage:
                tournament:
                  is_organizer:
                    _eq: true
            - tournament_bracket:
                stage:
                  tournament:
                    is_organizer:
                      _eq: true
      check: null
    comment: ""
delete_permissions:
  - role: match_organizer
    permission:
      filter:
        match_option:
          _or:
            - matches:
                is_organizer:
                  _eq: true
            - tournament:
                is_organizer:
                  _eq: true
            - tournament_stage:
                tournament:
                  is_organizer:
                    _eq: true
            - tournament_bracket:
                stage:
                  tournament:
                    is_organizer:
                      _eq: true
    comment: ""
