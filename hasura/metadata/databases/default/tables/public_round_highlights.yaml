table:
  name: round_highlights
  schema: public
object_relationships:
  - name: match
    using:
      foreign_key_constraint_on: match_id
  - name: match_map
    using:
      foreign_key_constraint_on: match_map_id
select_permissions:
  - role: administrator
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
  - role: match_organizer
    permission:
      columns: "*"
      filter: {}
      allow_aggregations: true
  - role: streamer
    permission:
      columns: "*"
      filter: {}
  - role: user
    permission:
      columns: "*"
      filter: {}
  - role: guest
    permission:
      columns: "*"
      filter: {}
insert_permissions:
  - role: administrator
    permission:
      check: {}
      columns:
        - match_id
        - match_map_id
        - round_number
        - steam_id
        - player_name
        - team
        - kills
        - label
        - weapon
        - metadata
delete_permissions:
  - role: administrator
    permission:
      filter: {}
